<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="100%" height="100%">
  <style>
    .chem-line {
      stroke: #1c1917; /* stone-900 */
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .chem-bold-line {
      stroke: #1c1917; /* stone-900 */
      stroke-width: 5.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .chem-text {
      fill: #1c1917; /* stone-900 */
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 600;
    }
    .chem-text-blue {
      fill: #3b82f6; /* blue-500 */
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 600;
    }
    @media (prefers-color-scheme: dark) {
      .chem-line {
        stroke: #f5f5f4; /* stone-100 */
      }
      .chem-bold-line {
        stroke: #f5f5f4; /* stone-100 */
      }
      .chem-text {
        fill: #e7e5e4; /* stone-200 */
      }
      .chem-text-blue {
        fill: #60a5fa; /* blue-400 */
      }
    }
  </style>

  <!-- BACKGROUND DECORATIVE RADIANCE (Optional/Subtle) -->
  <g opacity="0.03">
    <circle cx="340" cy="160" r="150" fill="url(#blue-glow)" />
  </g>
  <defs>
    <radialGradient id="blue-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <!-- ================= RING 1 (Galactose moiety - Left) ================= -->
  <!-- Ring skeleton bonds -->
  <line x1="100" y1="95" x2="120" y2="65" class="chem-line" />
  <line x1="120" y1="65" x2="158" y2="58" class="chem-line" />
  <line x1="176" y1="58" x2="210" y2="85" class="chem-line" />
  <line x1="210" y1="85" x2="180" y2="115" class="chem-bold-line" />
  <line x1="180" y1="115" x2="140" y2="115" class="chem-bold-line" />
  <line x1="140" y1="115" x2="100" y2="95" class="chem-bold-line" />

  <!-- Ring Oxygen -->
  <text x="162" y="61" class="chem-text-blue">O</text>

  <!-- Ring 1 Substituents -->
  <!-- Left glycosidic O-link -->
  <path d="M 20 85 Q 30 75 40 85 T 55 85" class="chem-line" /> <!-- Left wavy polymer end -->
  <line x1="55" y1="85" x2="72" y2="85" class="chem-line" />
  <text x="75" y="89" class="chem-text-blue">O</text>
  <line x1="86" y1="85" x2="100" y2="95" class="chem-line" />

  <!-- C5 side-chain (CH2-OH) -->
  <line x1="120" y1="65" x2="120" y2="35" class="chem-line" />
  <line x1="120" y1="35" x2="142" y2="35" class="chem-line" />
  <text x="146" y="39" class="chem-text-blue">OH</text>
  <!-- H at C5 -->
  <line x1="120" y1="65" x2="106" y2="53" class="chem-line" />
  <text x="96" y="49" class="chem-text-blue">H</text>

  <!-- C4 substituent (H) -->
  <line x1="100" y1="95" x2="80" y2="110" class="chem-line" />
  <text x="70" y="118" class="chem-text">H</text>

  <!-- C3 substituent (HO / H) -->
  <line x1="140" y1="115" x2="140" y2="140" class="chem-line" />
  <text x="135" y="152" class="chem-text-blue">H</text>
  <line x1="140" y1="115" x2="110" y2="125" class="chem-line" />
  <text x="90" y="129" class="chem-text">HO</text>

  <!-- C2 substituent (OH / H) -->
  <line x1="180" y1="115" x2="180" y2="140" class="chem-line" />
  <text x="171" y="152" class="chem-text-blue">OH</text>
  <line x1="180" y1="115" x2="195" y2="95" class="chem-line" />
  <text x="193" y="90" class="chem-text-blue">H</text>

  <!-- C1 substituent (H) -->
  <line x1="210" y1="85" x2="210" y2="110" class="chem-line" />
  <text x="206" y="122" class="chem-text-blue">H</text>


  <!-- ================= GLYCOSIDIC LINK 1 -> 2 ================= -->
  <line x1="210" y1="85" x2="235" y2="72" class="chem-line" />
  <text x="238" y="76" class="chem-text-blue">O</text>
  <line x1="250" y1="72" x2="280" y2="105" class="chem-line" />


  <!-- ================= RING 2 (Rhamnose moiety - Middle) ================= -->
  <!-- Ring skeleton bonds -->
  <line x1="280" y1="105" x2="300" y2="75" class="chem-line" />
  <line x1="300" y1="75" x2="338" y2="68" class="chem-line" />
  <line x1="356" y1="68" x2="390" y2="95" class="chem-line" />
  <line x1="390" y1="95" x2="360" y2="125" class="chem-bold-line" />
  <line x1="360" y1="125" x2="320" y2="125" class="chem-bold-line" />
  <line x1="320" y1="125" x2="280" y2="105" class="chem-bold-line" />

  <!-- Ring Oxygen -->
  <text x="342" y="71" class="chem-text-blue">O</text>

  <!-- Ring 2 Substituents -->
  <!-- C5 side-chain (CH3 methyl group of Rhamnose) -->
  <line x1="300" y1="75" x2="300" y2="45" class="chem-line" />
  <text x="286" y="40" class="chem-text-blue">CH<sub>3</sub></text>
  <!-- H at C5 -->
  <line x1="300" y1="75" x2="283" y2="60" class="chem-line" />
  <text x="273" y="55" class="chem-text-blue">H</text>

  <!-- C4 substituent (H) -->
  <line x1="280" y1="105" x2="260" y2="120" class="chem-line" />
  <text x="250" y="128" class="chem-text">H</text>

  <!-- C3 substituent (H & Wavy cross-link) -->
  <line x1="320" y1="125" x2="320" y2="150" class="chem-line" />
  <text x="316" y="162" class="chem-text-blue">H</text>
  <!-- Wavy trailing polymer end pointing down-left -->
  <path d="M 320 125 L 300 145" class="chem-line" />
  <path d="M 300 145 Q 295 155 290 145 T 280 150" class="chem-line" />

  <!-- C2 substituent (OH / H) -->
  <line x1="360" y1="125" x2="360" y2="150" class="chem-line" />
  <text x="351" y="162" class="chem-text-blue">OH</text>
  <line x1="360" y1="125" x2="375" y2="105" class="chem-line" />
  <text x="372" y="100" class="chem-text-blue">H</text>

  <!-- C1 substituent (H) -->
  <line x1="390" y1="95" x2="405" y2="75" class="chem-line" />
  <text x="403" y="70" class="chem-text-blue">H</text>


  <!-- ================= GLYCOSIDIC LINK 2 -> 3 ================= -->
  <line x1="390" y1="95" x2="415" y2="108" class="chem-line" />
  <text x="418" y="112" class="chem-text-blue">O</text>
  <line x1="430" y1="108" x2="460" y2="95" class="chem-line" />


  <!-- ================= RING 3 (Galacturonic acid - Right) ================= -->
  <!-- Ring skeleton bonds -->
  <line x1="460" y1="95" x2="480" y2="65" class="chem-line" />
  <line x1="480" y1="65" x2="518" y2="58" class="chem-line" />
  <line x1="536" y1="58" x2="570" y2="85" class="chem-line" />
  <line x1="570" y1="85" x2="540" y2="115" class="chem-bold-line" />
  <line x1="540" y1="115" x2="500" y2="115" class="chem-bold-line" />
  <line x1="500" y1="115" x2="460" y2="95" class="chem-bold-line" />

  <!-- Ring Oxygen -->
  <text x="522" y="61" class="chem-text-blue">O</text>

  <!-- Ring 3 Substituents -->
  <!-- C5 side-chain (COOH carboxylic group) -->
  <line x1="480" y1="65" x2="480" y2="35" class="chem-line" />
  <line x1="480" y1="35" x2="465" y2="35" class="chem-line" />
  <text x="454" y="39" class="chem-text-blue">O</text>
  <line x1="479" y1="33" x2="464" y2="33" class="chem-line" /> <!-- double-bond C=O -->
  <line x1="480" y1="35" x2="495" y2="20" class="chem-line" />
  <text x="498" y="18" class="chem-text-blue">OH</text>
  <!-- Label index/caption near COOH -->
  <text x="473" y="52" class="chem-text-blue">C</text>

  <!-- H at C5 -->
  <line x1="480" y1="65" x2="495" y2="53" class="chem-line" />
  <text x="498" y="49" class="chem-text-blue">H</text>

  <!-- C4 substituent (H) -->
  <line x1="460" y1="95" x2="442" y2="110" class="chem-line" />
  <text x="432" y="118" class="chem-text">H</text>

  <!-- C3 substituent (Hydride & Branch link downwards) -->
  <line x1="500" y1="115" x2="515" y2="135" class="chem-line" />
  <text x="512" y="141" class="chem-text-blue">H</text>

  <!-- Downward branch key linkages -->
  <line x1="500" y1="115" x2="485" y2="145" class="chem-line" />
  <text x="480" y="157" class="chem-text-blue">O</text>

  <!-- C2 substituent (OH / H) -->
  <line x1="540" y1="115" x2="555" y2="135" class="chem-line" />
  <text x="551" y="142" class="chem-text-blue">OH</text>
  <line x1="540" y1="115" x2="540" y2="90" class="chem-line" />
  <text x="536" y="85" class="chem-text-blue">H</text>

  <!-- C1 substituent (Right polymer connection) -->
  <line x1="570" y1="85" x2="585" y2="65" class="chem-line" />
  <text x="582" y="60" class="chem-text-blue">H</text>
  
  <line x1="570" y1="85" x2="595" y2="95" class="chem-line" />
  <text x="598" y="99" class="chem-text-blue">O</text>
  <path d="M 608 95 L 618 95" class="chem-line" />
  <path d="M 618 95 Q 628 85 638 95 T 650 95" class="chem-line" /> <!-- Right wavy polymer end -->


  <!-- ================= RING 4 (Branch moiety - Down-left) ================= -->
  <!-- Link from Ring 3 C3-O down to Ring 4 C1 -->
  <line x1="480" y1="162" x2="455" y2="195" class="chem-line" />

  <!-- Ring 4 skeleton bonds -->
  <line x1="410" y1="215" x2="430" y2="185" class="chem-line" />
  <line x1="430" y1="185" x2="468" y2="178" class="chem-line" />
  <line x1="486" y1="178" x2="520" y2="205" class="chem-line" />
  <line x1="520" y1="205" x2="490" y2="235" class="chem-bold-line" />
  <line x1="490" y1="235" x2="450" y2="235" class="chem-bold-line" />
  <line x1="450" y1="235" x2="410" y2="215" class="chem-bold-line" />

  <!-- Ring 4 Oxygen -->
  <text x="472" y="181" class="chem-text-blue">O</text>

  <!-- Ring 4 Substituents -->
  <!-- C5 substituent (H) -->
  <line x1="430" y1="185" x2="415" y2="165" class="chem-line" />
  <text x="412" y="160" class="chem-text-blue">H</text>

  <!-- C4 side-chain (Anionic COO-) -->
  <line x1="410" y1="215" x2="390" y2="235" class="chem-line" />
  <text x="350" y="240" class="chem-text-blue"><sup>-</sup>OOC</text>

  <!-- C3 substituent (OH / H) -->
  <line x1="450" y1="235" x2="450" y2="260" class="chem-line" />
  <text x="441" y="272" class="chem-text-blue">OH</text>
  <line x1="450" y1="235" x2="435" y2="215" class="chem-line" />
  <text x="432" y="210" class="chem-text-blue">H</text>

  <!-- C2 substituent (OH / H) -->
  <line x1="490" y1="235" x2="490" y2="260" class="chem-line" />
  <text x="481" y="272" class="chem-text-blue">OH</text>
  <line x1="490" y1="235" x2="475" y2="215" class="chem-line" />
  <text x="472" y="210" class="chem-text-blue">H</text>

  <!-- C1 substituent (H) -->
  <line x1="520" y1="205" x2="535" y2="185" class="chem-line" />
  <text x="531" y="180" class="chem-text-blue">H</text>

</svg>
